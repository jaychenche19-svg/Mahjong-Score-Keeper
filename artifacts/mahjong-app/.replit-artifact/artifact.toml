kind = "web"
previewPath = "/"
title = "麻將狗"
version = "1.0.0"
id = "artifacts/mahjong-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21820

[services.development]
run = "pnpm --filter @workspace/mahjong-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mahjong-app", "run", "build" ]
publicDir = "artifacts/mahjong-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21820"
BASE_PATH = "/"
